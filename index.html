<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Чеклист</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#fafafa;color:#222}
    button{cursor:pointer;font-family:inherit}
    input,select{font-family:inherit}
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

const {useState,useEffect,useCallback,createElement:h} = React;
const TABS = ["Журнал","Задачи","Графики"];
const PERIODS = ["7 дней","30 дней","Всё время"];
const COLORS = ["#3266ad","#1D9E75","#D85A30","#7F77DD","#BA7517","#D4537E","#639922"];

function fmt(d){return d.toISOString().slice(0,10);}
function today(){return fmt(new Date());}
function daysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return fmt(d);}
function labelDate(s){const[,m,d]=s.split("-");return d+"."+m;}
function ruDate(s){
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("ru-RU",{weekday:"short",day:"numeric",month:"long"});
}

function BarChartSVG({data,dataKey,color,label}){
  const W=340,H=140,PL=36,PB=24,PT=8,PR=8;
  const vals=data.map(d=>d[dataKey]??0);
  const max=Math.max(...vals,1);
  const cW=W-PL-PR,cH=H-PT-PB;
  const bW=Math.max(4,cW/data.length-2);
  return h('div',{style:{marginBottom:24}},
    h('p',{style:{fontSize:13,color:"#888",marginBottom:6}},label),
    h('svg',{width:"100%",viewBox:`0 0 ${W} ${H}`},
      [0,50,100].map(v=>h('g',{key:v},
        h('text',{x:PL-4,y:PT+cH-(v/100)*cH+4,textAnchor:"end",fontSize:10,fill:"#aaa"},v+"%"),
        h('line',{x1:PL,x2:W-PR,y1:PT+cH-(v/100)*cH,y2:PT+cH-(v/100)*cH,stroke:"#eee",strokeWidth:1})
      )),
      data.map((d,i)=>{
        const v=d[dataKey]??null;
        const bH=v===null?0:Math.max(2,(v/max)*cH);
        const x=PL+i*(cW/data.length)+(cW/data.length-bW)/2;
        const y=PT+cH-bH;
        return h('g',{key:i},
          h('rect',{x,y,width:bW,height:bH,fill:color,rx:2}),
          i%Math.ceil(data.length/7)===0&&h('text',{x:x+bW/2,y:H-2,textAnchor:"middle",fontSize:9,fill:"#aaa"},d.date)
        );
      })
    )
  );
}

function LineChartSVG({data,tasks}){
  const W=340,H=140,PL=36,PB=24,PT=8,PR=8;
  const cW=W-PL-PR,cH=H-PT-PB;
  const allVals=tasks.flatMap(t=>data.map(d=>d[t.name]).filter(v=>v!=null));
  const max=Math.max(...allVals,1);
  return h('svg',{width:"100%",viewBox:`0 0 ${W} ${H}`},
    [0,Math.round(max/2),max].map((v,i)=>h('g',{key:i},
      h('text',{x:PL-4,y:PT+cH-(v/max)*cH+4,textAnchor:"end",fontSize:10,fill:"#aaa"},Math.round(v)),
      h('line',{x1:PL,x2:W-PR,y1:PT+cH-(v/max)*cH,y2:PT+cH-(v/max)*cH,stroke:"#eee",strokeWidth:1})
    )),
    tasks.map((t,ti)=>{
      const pts=data.map((d,i)=>{
        const v=d[t.name];
        if(v==null)return null;
        return[PL+(i/(data.length-1||1))*cW, PT+cH-(v/max)*cH];
      });
      const segs=[];let cur=[];
      pts.forEach(p=>{if(p){cur.push(p);}else{if(cur.length>1)segs.push(cur);cur=[];}});
      if(cur.length>1)segs.push(cur);
      return h('g',{key:t.id},segs.map((seg,si)=>
        h('polyline',{key:si,points:seg.map(p=>p.join(",")).join(" "),
          fill:"none",stroke:COLORS[ti%COLORS.length],strokeWidth:2})
      ));
    }),
    data.map((d,i)=>i%Math.ceil(data.length/7)===0&&
      h('text',{key:i,x:PL+(i/(data.length-1||1))*cW,y:H-2,
        textAnchor:"middle",fontSize:9,fill:"#aaa"},d.date)
    )
  );
}

function App(){
  const [tab,setTab]=useState(0);
  const [tasks,setTasks]=useState([]);
  const [logs,setLogs]=useState({});
  const [period,setPeriod]=useState(0);
  const [newName,setNewName]=useState("");
  const [newType,setNewType]=useState("bool");
  const [selDate,setSelDate]=useState(today());

  useEffect(()=>{
    try{const t=localStorage.getItem("tasks");if(t)setTasks(JSON.parse(t));}catch{}
    try{const l=localStorage.getItem("logs");if(l)setLogs(JSON.parse(l));}catch{}
  },[]);

  const saveTasks=useCallback(t=>{setTasks(t);try{localStorage.setItem("tasks",JSON.stringify(t));}catch{}},[]);
  const saveLogs=useCallback(l=>{setLogs(l);try{localStorage.setItem("logs",JSON.stringify(l));}catch{}},[]);

  const dayLogs=logs[selDate]||{};

  function addTask(){
    const name=newName.trim();
    if(!name)return;
    saveTasks([...tasks,{id:Date.now(),name,type:newType}]);
    setNewName("");
  }
  function removeTask(id){saveTasks(tasks.filter(t=>t.id!==id));}
  function setLog(taskId,val){
    saveLogs({...logs,[selDate]:{...dayLogs,[taskId]:val}});
  }

  function shiftDate(n){
    const d=new Date(selDate+"T12:00:00");
    d.setDate(d.getDate()+n);
    const s=fmt(d);
    if(s<=today()) setSelDate(s);
  }

  function getChartData(){
    let days;
    if(period===0) days=Array.from({length:7},(_,i)=>daysAgo(6-i));
    else if(period===1) days=Array.from({length:30},(_,i)=>daysAgo(29-i));
    else{
      const all=Object.keys(logs).sort();
      if(!all.length){days=[today()];}
      else{
        const s=new Date(all[0]),e=new Date(today());
        days=[];
        for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))days.push(fmt(new Date(d)));
      }
    }
    return days.map(date=>{
      const dl=logs[date]||{};
      const row={date:labelDate(date)};
      tasks.forEach(t=>{
        const v=dl[t.id];
        row[t.name]=t.type==="bool"?(v===true?1:v===false?0:null):(v!==undefined?Number(v):null);
      });
      const bt=tasks.filter(x=>x.type==="bool");
      row._pct=bt.length?Math.round(bt.filter(x=>dl[x.id]===true).length/bt.length*100):null;
      const allDone=tasks.filter(x=>{
        const v=dl[x.id];
        return x.type==="bool"?v===true:v!==undefined&&v!==""&&Number(v)!==0;
      }).length;
      row._total=tasks.length?Math.round(allDone/tasks.length*100):null;
      return row;
    });
  }

  const chartData=getChartData();
  const numTasks=tasks.filter(t=>t.type==="num");
  const boolTasks=tasks.filter(t=>t.type==="bool");
  const isToday=selDate===today();

  const S={
    card:{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",
      marginBottom:8,background:"#fff",border:"1px solid #e5e5e5",borderRadius:8},
    btn:a=>({padding:"6px 16px",borderRadius:8,border:"1px solid #ddd",
      background:a?"#f0f0f0":"transparent",fontWeight:a?500:400,fontSize:14,cursor:"pointer"}),
    inp:{fontSize:14,padding:"6px 10px",border:"1px solid #ddd",borderRadius:8,background:"#fff"},
    navBtn:{width:36,height:36,borderRadius:8,border:"1px solid #ddd",
      background:"transparent",fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"},
  };

  return h('div',{style:{maxWidth:600,margin:"0 auto",padding:"1rem 1rem 3rem"}},
    h('h2',{style:{fontSize:18,fontWeight:500,marginBottom:"1rem"}},"Ежедневный чеклист"),
    h('div',{style:{display:"flex",gap:8,marginBottom:"1.5rem"}},
      TABS.map((label,i)=>h('button',{key:i,onClick:()=>setTab(i),style:S.btn(tab===i)},label))
    ),

    // TAB 0 — Журнал
    tab===0&&h('div',null,
      // Навигация по датам
      h('div',{style:{display:"flex",alignItems:"center",gap:8,marginBottom:"1rem",flexWrap:"wrap"}},
        h('button',{onClick:()=>shiftDate(-1),style:S.navBtn},"←"),
        h('input',{type:"date",value:selDate,max:today(),
          onChange:e=>{if(e.target.value<=today())setSelDate(e.target.value);},
          style:{...S.inp,flex:1,minWidth:130}}),
        h('button',{onClick:()=>shiftDate(1),disabled:isToday,
          style:{...S.navBtn,opacity:isToday?0.3:1}},"→"),
        !isToday&&h('button',{onClick:()=>setSelDate(today()),style:S.btn(false)},"Сегодня")
      ),
      h('p',{style:{fontSize:13,color:"#888",marginBottom:"1rem"}},ruDate(selDate)),

      tasks.length===0&&h('p',{style:{color:"#888",fontSize:14}},"Нет задач. Добавь их на вкладке «Задачи»."),
      tasks.map(t=>h('div',{key:t.id,style:S.card},
        h('span',{style:{flex:1,fontSize:15}},t.name),
        t.type==="bool"
          ?h('div',{style:{display:"flex",gap:6}},
            h('button',{onClick:()=>setLog(t.id,true),style:{
              width:36,height:36,borderRadius:8,border:"1px solid #ddd",fontSize:18,
              background:dayLogs[t.id]===true?"#1D9E75":"transparent",
              color:dayLogs[t.id]===true?"#fff":"#aaa"}},"✓"),
            h('button',{onClick:()=>setLog(t.id,false),style:{
              width:36,height:36,borderRadius:8,border:"1px solid #ddd",fontSize:18,
              background:dayLogs[t.id]===false?"#E24B4A":"transparent",
              color:dayLogs[t.id]===false?"#fff":"#aaa"}},"✗")
          )
          :h('input',{type:"number",placeholder:"0",
            value:dayLogs[t.id]!==undefined?dayLogs[t.id]:"",
            onChange:e=>setLog(t.id,e.target.value===""?undefined:Number(e.target.value)),
            style:{...S.inp,width:80,textAlign:"right"}})
      ))
    ),

    // TAB 1 — Задачи
    tab===1&&h('div',null,
      h('div',{style:{display:"flex",gap:8,marginBottom:"1.25rem",flexWrap:"wrap"}},
        h('input',{value:newName,onChange:e=>setNewName(e.target.value),
          onKeyDown:e=>e.key==="Enter"&&addTask(),
          placeholder:"Название задачи",style:{...S.inp,flex:1,minWidth:140}}),
        h('select',{value:newType,onChange:e=>setNewType(e.target.value),style:S.inp},
          h('option',{value:"bool"},"Да/Нет"),
          h('option',{value:"num"},"Число")
        ),
        h('button',{onClick:addTask,style:S.btn(false)},"Добавить")
      ),
      tasks.length===0&&h('p',{style:{color:"#888",fontSize:14}},"Список пуст."),
      tasks.map(t=>h('div',{key:t.id,style:S.card},
        h('span',{style:{flex:1,fontSize:15}},t.name),
        h('span',{style:{fontSize:12,padding:"2px 8px",borderRadius:8,background:"#f0f0f0",color:"#666"}},
          t.type==="bool"?"Да/Нет":"Число"),
        h('button',{onClick:()=>removeTask(t.id),
          style:{background:"transparent",border:"none",color:"#bbb",fontSize:20,padding:"0 4px"}},"×")
      ))
    ),

    // TAB 2 — Графики
    tab===2&&h('div',null,
      h('div',{style:{display:"flex",gap:8,marginBottom:"1.25rem"}},
        PERIODS.map((p,i)=>h('button',{key:i,onClick:()=>setPeriod(i),style:S.btn(period===i)},p))
      ),
      tasks.length===0&&h('p',{style:{color:"#888",fontSize:14}},"Нет задач для отображения."),
      tasks.length>0&&h(BarChartSVG,{data:chartData,dataKey:"_total",color:"#3266ad",label:"Общее выполнение (все задачи)"}),
      boolTasks.length>0&&h(BarChartSVG,{data:chartData,dataKey:"_pct",color:"#1D9E75",label:"Выполнение Да/Нет задач"}),
      numTasks.length>0&&h('div',null,
        h('p',{style:{fontSize:13,color:"#888",marginBottom:6}},"Числовые показатели"),
        h('div',{style:{display:"flex",flexWrap:"wrap",gap:12,marginBottom:8}},
          numTasks.map((t,i)=>h('span',{key:t.id,style:{display:"flex",alignItems:"center",gap:4,fontSize:12,color:"#888"}},
            h('span',{style:{width:10,height:10,borderRadius:2,background:COLORS[i%COLORS.length],display:"inline-block"}}),
            t.name
          ))
        ),
        h(LineChartSVG,{data:chartData,tasks:numTasks})
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
